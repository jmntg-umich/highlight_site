<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Collaborative Highlighter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">HL</div>
      <div>
        <div class="title">Collaborative Highlighter</div>
      </div>
    </div>


  </header>

  <main class="layout">
    <aside class="sidebar">
  <section class="card">
    <div id="palette" class="palette"></div>
  </section>

  <section class="card">
    <h2>View</h2>
    <div class="toggle-group" role="radiogroup" aria-label="View mode">
      <label class="toggle">
        <input type="radio" name="viewMode" value="clean" />
        <span>Clean</span>
      </label>
      <label class="toggle">
        <input type="radio" name="viewMode" value="mine" checked />
        <span>Mine</span>
      </label>
      <label class="toggle">
        <input type="radio" name="viewMode" value="community" />
        <span>Community</span>
      </label>

    </div>

    <div class="row">
      <button id="refreshCommunityBtn" class="btn btn-secondary">Refresh community</button>
    </div>
  </section>

  <section class="card">
    <h2>Clear</h2>
    <div class="row">
      <button id="clearMineBtn" class="btn btn-secondary" title="Clears only your local highlights">
        Clear all mine
      </button>

      <button id="clearCommunityBtn" class="btn btn-secondary" title="Clears all community highlights (requires password)">
        Clear community highlights
      </button>
    </div>
  </section>
</aside>

    <section class="reader">
        <div class="reader-header">
        </div>

  <div class="content-wrap">
    <pre id="textLayer" class="content text-layer" tabindex="0" aria-label="Text content"></pre>
    <div id="hlLayer" class="content hl-layer" aria-hidden="true"></div>    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>

  <div id="pwModal" class="modal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="pwTitle">
    <h2 id="pwTitle">Enter password</h2>
    <p class="muted">This will clear all community highlights.</p>

    <div class="pw-row">
      <input id="pwInput" class="text-input" type="password" placeholder="Password" />
<button id="pwToggle" class="icon-btn" type="button" aria-label="Show password" title="Show/hide password">
  <svg id="iconEye" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
    <path fill="currentColor" d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5A2.5 2.5 0 1 0 12 9.5a2.5 2.5 0 0 0 0 5Z"/>
  </svg>
  <svg id="iconEyeOff" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" style="display:none;">
    <path fill="currentColor" d="M3.3 4.7 2 6l3.1 3.1C3.2 10.8 2 12 2 12s3 7 10 7c2.1 0 3.9-.6 5.3-1.4L20 20l1.3-1.3L3.3 4.7ZM12 17c-5 0-7.6-4.4-7.9-5 .3-.4 1.2-1.8 2.8-3.1l1.8 1.8A5 5 0 0 0 13.3 16l1.7 1c-.9.3-1.9.5-3 .5Zm9.9-5c-.2.3-1.3 2.3-3.5 3.7l-1.5-1.5A5 5 0 0 0 9.8 7.5L8.3 6C9.4 5.4 10.6 5 12 5c7 0 10 7 10 7Z"/>
  </svg>
</button>
    </div>

    <div class="row">
      <button id="pwCancel" class="btn btn-secondary" type="button">Cancel</button>
      <button id="pwConfirm" class="btn btn-secondary" type="button">Clear</button>
    </div>

    <div id="pwError" class="muted" style="margin-top:10px; display:none;"></div>
  </div>
</div>
</body>
</html>
